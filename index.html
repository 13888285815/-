<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- ── 安全：Referrer 策略 ── -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ── 安全：CSP meta 备用（服务器 Header 优先级更高，此处作为兜底） -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"
    />

    <!-- ── 安全：禁止 MIME 嗅探 ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- 视口 & 图标 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- SEO / 描述 -->
    <meta name="description" content="自动推广工具 — 帮助您将网址推广到全球用户" />
    <meta name="robots" content="index, follow" />

    <title>自动推广工具</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
