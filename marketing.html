<!doctype html>
<html lang="zh-CN" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── 跨平台视口适配：iOS Safari / Android / 鸿蒙 / 桌面端 ── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover"
    />

    <!-- ── 移动端浏览器主题色 ── -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: dark)" />

    <!-- ── iOS / iPadOS 特殊 Meta ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Auto Promo" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── 鸿蒙 / Android 浏览器适配 ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="HandheldFriendly" content="True" />
    <meta name="MobileOptimized" content="320" />

    <!-- ── Windows / IE / Edge 兼容 ── -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- ── 安全：Referrer 策略 ── -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ── 安全：CSP meta 备用 ── -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"
    />

    <!-- ── 安全：禁止 MIME 嗅探 ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- ── SEO / Open Graph ── -->
    <meta name="description" content="Auto Promotion Tool — 帮助您将网址推广到全球用户 | Promote your URL to global users" />
    <meta name="keywords" content="推广工具,URL推广,自动推广,SEO,promotion tool" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Auto Promotion Tool" />
    <meta property="og:description" content="帮助您将网址推广到全球用户" />
    <!-- ── 多语言字体（Google Fonts）：中文/日文/阿拉伯文/拉丁文 ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+Arabic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Tailwind CSS Play CDN（生产推荐 PostCSS 版本） ── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Tailwind 配置：响应式断点 + 暗色模式 + 自定义字体
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            fontFamily: {
              sans: [
                'Noto Sans SC',
                'Noto Sans JP',
                'Noto Sans Arabic',
                'Noto Sans',
                '-apple-system',
                'BlinkMacSystemFont',
                'Segoe UI',
                'Roboto',
                'Helvetica Neue',
                'Arial',
                'sans-serif',
              ],
            },
            screens: {
              xs: '375px',
              sm: '640px',
              md: '768px',
              lg: '1024px',
              xl: '1280px',
              '2xl': '1536px',
            },
          },
        },
      }
    </script>

    <!-- ── 图标 ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />

    <title>Auto Promotion Tool — 自动推广工具</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
